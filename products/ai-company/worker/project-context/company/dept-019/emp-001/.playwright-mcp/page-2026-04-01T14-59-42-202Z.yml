          - heading "はじめに：建設業のホームページは「信頼」をつくるための最強ツール" [level=2] [ref=e99]
          - paragraph [ref=e100]:
            - text: 現在、多くの建設業者がホームページを持つようになり、
            - strong [ref=e101]: インターネット経由での集客や求人
            - text: が当たり前の時代になっています。
            - text: 特に東京都・横浜市・名古屋市・神戸市・大阪市などといった地域では、競合も非常に多い状況です。
          - paragraph [ref=e102]: そんな中で「どんなページを作るか」が、ホームページの成否を分ける大きなポイントになります。
          - paragraph [ref=e103]:
            - text: この記事では、
            - strong [ref=e104]: 成果を出すホームページの構成例・必要ページ一覧
            - text: を丁寧に解説します。
          - link "まずはお気軽にお問い合わせ" [ref=e108] [cursor=pointer]:
            - /url: https://wins-connect.com/contact-form/
            - strong [ref=e110]: まずはお気軽にお問い合わせ
          - separator [ref=e111]
