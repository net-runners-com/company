                  - cell "採用情報" [ref=e140]
                  - cell "求人の強化に不可欠" [ref=e141]
                - row "ブログ・お知らせ 更新情報・SEO強化・企業の人間味を伝える" [ref=e142]:
                  - cell "ブログ・お知らせ" [ref=e143]
                  - cell "更新情報・SEO強化・企業の人間味を伝える" [ref=e144]
          - separator [ref=e145]
          - heading "2. トップページ：第一印象で選ばれる構成とは？" [level=2] [ref=e146]
          - heading "必要な要素：" [level=3] [ref=e147]
          - list [ref=e148]:
            - listitem [ref=e149]: 強みを一目で伝えるキャッチコピー（例：「明石市で30年の実績！外構工事のプロ」）
            - listitem [ref=e150]: 最新の施工事例のダイジェスト表示
            - listitem [ref=e151]: 対応エリアの記載（例：兵庫県・大阪府全域対応）
            - listitem [ref=e152]: お問い合わせボタンの設置
            - listitem [ref=e153]: スマホ対応の見やすいデザイン
          - paragraph [ref=e154]:
            - strong [ref=e155]: トップページは「信頼」と「導線設計」が命
            - text: です。
            - text: 特に東京都・横浜市・神戸市・大阪市など都市部では、ユーザーは複数社のサイトを比較して判断します。強みを明確に表現しましょう。
          - separator [ref=e156]
          - heading "3. 会社概要ページ：信頼を得る情報開示" [level=2] [ref=e157]
          - heading "記載すべき内容：" [level=3] [ref=e158]
          - list [ref=e159]:
            - listitem [ref=e160]: 会社名・所在地（例：兵庫県神戸市西区…）
            - listitem [ref=e161]: 代表者名・挨拶文
            - listitem [ref=e162]: 設立年・沿革
            - listitem [ref=e163]: 事業内容の要約
            - listitem [ref=e164]: 建設業許可番号など法的情報
          - paragraph [ref=e165]:
            - text: 近年は特に
            - strong [ref=e166]: 所在地（地域密着）を重視するユーザーが多く
            - text: 、
            - text: 「神戸市 工務店 信頼できる」「尼崎市 リフォーム会社 評判」といった検索が増えています。
          - paragraph [ref=e167]: 地域密着であることを明記することで、信頼と安心を獲得できます。
          - separator [ref=e168]
          - heading "4. 事業内容ページ：何ができるかを明確に" [level=2] [ref=e169]
          - paragraph [ref=e170]:
            - text: 業種に応じた専門性を出すことで、
            - strong [ref=e171]: 「自分のニーズに合っている業者だ」と思ってもらえる
            - text: 構成になります。
          - paragraph [ref=e172]:
            - text: 以下に記載例です。事業内容を明確にすることはもちろんですが、
            - strong [ref=e173]: 対応エリアや強みを記載することも重要です。
          - paragraph [ref=e174]:
            - strong [ref=e175]: "-記載例-"
            - text: 兵庫県や大阪府エリア（神戸市・明石市・西宮市・尼崎市・姫路市・大阪市など）を中心に、個人様・法人様問わず幅広い施工に対応しています。戸建て住宅の外構工事から、公共工事、法人施設のリノベーション、マンション・ビルの修繕まで、地域密着で高品質な施工を行っております。
            - text: 「どこに頼めばいいかわからない」「複数の工事をまとめて依頼したい」などのお悩みも、当社にご相談ください。
          - paragraph [ref=e176]:
            - strong [ref=e177]: 選ばれる理由
            - text: ▶ 自社施工だから中間マージンなしで高品質
            - text: 長年の経験を持つ職人が直接施工を行います。お客様との打ち合わせ内容をしっかり現場に反映できます。
          - paragraph [ref=e178]:
            - text: ▶ 地域密着で迅速対応
            - text: 兵庫県・大阪府全域対応。神戸市・明石市・尼崎市・大阪市など近隣エリアは即日対応も可能です。
          - paragraph [ref=e179]:
            - text: ▶ 一貫対応で安心のワンストップサービス
            - text: 見積もり・設計・施工・アフターサービスまで一社で完結。リフォームや小規模改修にも柔軟に対応可能です。
          - paragraph [ref=e180]:
            - strong [ref=e181]: 実際のホームページに掲載する際には、写真・施工例などを入れることでより効果的です。
          - separator [ref=e182]
          - heading "5. 施工事例ページ：信頼を可視化する最重要コンテンツ" [level=2] [ref=e183]
          - paragraph [ref=e184]:
            - text: 兵庫県や大阪市周辺では、
            - strong [ref=e185]: 競合との差別化
            - text: が難しくなっています。
            - text: そこで最も効果的なのが「施工事例の写真と説明」です。
          - heading "良い施工事例ページのポイント：" [level=3] [ref=e186]
          - list [ref=e187]:
            - listitem [ref=e188]: ビフォー・アフターの写真
            - listitem [ref=e189]: 工事内容の詳細
            - listitem [ref=e190]: 工期・金額帯（可能な範囲で）
            - listitem [ref=e191]: お客様の声のリンク
          - paragraph [ref=e192]:
            - text: ユーザーは「実績のある会社」に依頼したいと思っています。
            - text: 特に地域名（例：神戸市で外構工事を行いました）を入れることでSEOにも効果があります。
          - separator [ref=e193]
          - heading "6. お問い合わせページ：迷わせず、安心させる設計を" [level=2] [ref=e194]
          - paragraph [ref=e195]: ユーザーが「問い合わせてみよう」と思っても、ページがわかりにくいと離脱してしまいます。
          - heading "必要な要素：" [level=3] [ref=e196]
          - list [ref=e197]:
            - listitem [ref=e198]: フォーム（氏名・電話・メール・相談内容）
            - listitem [ref=e199]: 受付時間の明記
            - listitem [ref=e200]: プライバシーポリシーリンク
            - listitem [ref=e201]: 地図やアクセス情報
          - paragraph [ref=e202]:
            - text: 特に、
            - strong [ref=e203]: スマホでの問い合わせのしやすさ
            - text: は絶対に意識しましょう。
          - separator [ref=e204]
          - heading "7. 採用情報ページ：人手不足を解消するページ" [level=2] [ref=e205]
          - paragraph [ref=e206]:
            - text: 建設業界は慢性的な人手不足です。
            - text: そのため、求人ページをしっかり作ることが重要です。
          - heading "掲載すべき内容：" [level=3] [ref=e207]
          - list [ref=e208]:
            - listitem [ref=e209]: 募集職種と仕事内容
            - listitem [ref=e210]: 勤務地（例：神戸市・大阪市など）
            - listitem [ref=e211]: 給与・福利厚生
            - listitem [ref=e212]: 職場の雰囲気を伝える写真
            - listitem [ref=e213]: 先輩社員の声
          - paragraph [ref=e214]:
            - strong [ref=e215]: 検索ワード例：大阪市 建設会社 求人／姫路市 工務店 就職
            - text: などのキーワードでの流入を期待できます。
          - separator [ref=e216]
          - heading "8. ブログ・お知らせ：SEOと人間味の両立" [level=2] [ref=e217]
          - paragraph [ref=e218]: 継続的な更新は、Googleからの評価を高め、「生きているホームページ」と見なされます。
          - paragraph [ref=e219]: 更新内容の例：
          - list [ref=e220]:
            - listitem [ref=e221]: 施工事例の詳細紹介（地域名込み）
            - listitem [ref=e222]: スタッフ紹介
            - listitem [ref=e223]: お客様の声
            - listitem [ref=e224]: イベント出展や休業日の案内
          - paragraph [ref=e225]:
            - strong [ref=e226]: 例：横浜市でフェンス設置工事を行いました（ブログ記事タイトル）
            - text: → これが検索に引っかかりやすくなります。
          - separator [ref=e227]
          - heading "✅ 最後に：ホームページ制作をご検討の方へ" [level=2] [ref=e228]
          - paragraph [ref=e229]:
            - text: 当社では、
            - strong [ref=e230]: 建設業・工務店・製造業に特化したホームページ制作
            - text: を行っています。
            - text: 「施工事例を自分で更新したい」「スマホで簡単に編集したい」などのご要望にも対応可能です。
          - blockquote [ref=e231]:
            - paragraph [ref=e232]: 💡「自社で簡単に更新できるホームページ」にご興味がある方は、ぜひお気軽にご相談ください！
