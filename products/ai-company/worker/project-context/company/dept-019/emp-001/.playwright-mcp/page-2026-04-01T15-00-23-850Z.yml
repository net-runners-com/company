            - paragraph [ref=e183]: 大手感満載の、様々なページに移動しやすいハブに特化したトップページのホームページデザインです。「数字で見る西松建設」というコンテンツはインパクトがあって、会社としての迫力を感じます。全体として綺麗にまとまっているのですが、技術ページなどが他の資料からの使いまわしだろうというデザインで、バナーが一致しないデザインが所々挟み込まれており、この辺を統一できるともっと世界観の伝わるホームページデザインになるんだろうなと感じました。
