            - link "株式会社タケウチ建設｜地盤改良工事、軟弱地盤基礎工法 タケウチ建設は、TNF2.0工法・T-BAGS減震工法など独自の技術を活かし、安心・安全で環境に優しい地盤改良を実現。長年培った知識と革新的な発想で、常に変革を追求する“オンリーワン企業”を目指しています。 www.takeuchi-const.co.jp" [ref=e86] [cursor=pointer]:
              - /url: https://www.takeuchi-const.co.jp/
              - generic [ref=e87]:
                - generic [ref=e88]: 株式会社タケウチ建設｜地盤改良工事、軟弱地盤基礎工法
                - generic [ref=e89]: タケウチ建設は、TNF2.0工法・T-BAGS減震工法など独自の技術を活かし、安心・安全で環境に優しい地盤改良を実現。長年培った知識と革新的な発想で、常に変革を追求する“オンリーワン企業”を目指しています。
                - generic [ref=e90]:
                  - img [ref=e91]
                  - text: www.takeuchi-const.co.jp
              - img [ref=e93]
            - paragraph [ref=e94]: 特殊な地盤基礎工法が強みである株式会社タケウチ建設様のホームページをリニューアルさせていただきました。企業規模も年々大きくなられている会社ですので、大手感があり、信頼を得られるようなデザインにすることをベースに、社内にウェブを編集できる方がいらっしゃった関係で、社内でも新しい広報の追加があった際に更新が可能なようなデザインの両立というところをテーマにしました。また、メインビジュアルは動画にし、特に伝えたい情報のお知らせを視覚的にもおしゃれに見やすくPRできるようなデザインになったのではないかと思います。
            - heading "信頼感のある建設会社のホームページデザイン" [level=2] [ref=e95]
            - heading "村本建設" [level=3] [ref=e96]
            - paragraph [ref=e97]:
              - img "村本建設" [ref=e98]
            - paragraph [ref=e99]:
              - link "https://www.muramoto.co.jp/" [ref=e100] [cursor=pointer]:
                - /url: https://www.muramoto.co.jp/
            - paragraph [ref=e101]: 「愛をもっと村元という」キャッチコピーとセットのムービーで始まるメインビジュアルを使用しています。様々な現場の人間が誠実に働いている様子が伝わってきます。全体的に水色をベースにデザインし、爽やかで信頼を得られそうなデザインをしています。「愛のあるエピソード」というユニークなコンテンツが、会社のカラーがとてもよく出ている良いコンテンツではないかと思いました。
            - heading "七浦建設株式会社" [level=3] [ref=e102]
            - paragraph [ref=e103]:
              - img "七浦建設株式会社" [ref=e104]
            - paragraph [ref=e105]:
              - link "https://www.7ura.jp/" [ref=e106] [cursor=pointer]:
                - /url: https://www.7ura.jp/
            - paragraph [ref=e107]: 栃木県の建設会社のホームページです。最近では少し珍しいですが、マウスにアニメーションが付いてきます。いやらしくない程度のアニメーションとなっており、またリンクをクリックすると追従するアニメーションが目立つようになるなど、ユーザビリティの面でも配慮されています。オレンジをポイントに使ったデザインとなっており、フッターには適切なCTAも設置されています。
            - heading "共立建設株式会社" [level=3] [ref=e108]
            - paragraph [ref=e109]:
              - img "共立建設株式会社" [ref=e110]
            - paragraph [ref=e111]:
              - link "https://www.kyoritsu-con.co.jp/" [ref=e112] [cursor=pointer]:
                - /url: https://www.kyoritsu-con.co.jp/
            - paragraph [ref=e113]: NTTの関連会社である建設会社のホームページです。赤色で全体がまとめられています。赤色は攻めたイメージになりがちですが、ポイントで必要最低限に赤色を利用することで、イケイケというよりは情熱的なイメージが伝わってきます。ソリューション部分のリンク先がシンプルな文字のボタンになっているのですが、こういったリンクも意外にわかりやすいなと参考になりました。沿革が非常にボリューミーで、3ページに渡ってまとめられている沿革は初めて見ました。「街をつくる、人をつなぐ、技術を活かす」というアニメーションが、キャッチコピーとマッチしたアニメーションになっている点も素晴らしいです。
            - heading "誠実さを感じる建設会社のホームページデザイン" [level=2] [ref=e114]
            - heading "西野建設工業株式会社" [level=3] [ref=e115]
            - paragraph [ref=e116]:
              - img "西野建設工業株式会社" [ref=e117]
            - paragraph [ref=e118]:
              - link "https://nishinokensetsukogyo.co.jp/" [ref=e119] [cursor=pointer]:
                - /url: https://nishinokensetsukogyo.co.jp/
            - paragraph [ref=e120]: 印象的なキャッチコピーを明朝でシンプルに打ち出したファーストビューが印象的です。全体として優しい印象になっており、誠実な印象を持たせてくれます。ポイントで縦書きを利用しており、メニューであることが縦に記載されている影響でわかりやすいです。授業内容などシンプルにまとまっており、建設会社として最低限シンプルにまとまっている良い事例ではないでしょうか。
            - heading "松栄建設" [level=3] [ref=e121]
            - paragraph [ref=e122]:
              - img "松栄建設" [ref=e123]
            - paragraph [ref=e124]:
              - link "https://syo-ei.com/" [ref=e125] [cursor=pointer]:
                - /url: https://syo-ei.com/
            - paragraph [ref=e126]: 優しい黄緑色で全体がまとめられています。おそらくロゴのカラーに合わせたのでしょう。柔らかい印象だけでなく、所々に細かいデザインのこだわりが感じられます。ハンバーガーメニューはメニューではなく「OPEN」というラベリングになっていたり、電話番号もポイントでカラーが変わっています。更新頻度の高いブログも日付の部分が可愛らしく差し込まれているのが印象的です。
            - heading "株式会社スミカ" [level=3] [ref=e127]
            - paragraph [ref=e128]:
              - img "株式会社スミカ" [ref=e129]
            - paragraph [ref=e130]:
              - link "https://www.smica.net/" [ref=e131] [cursor=pointer]:
                - /url: https://www.smica.net/
            - paragraph [ref=e132]: インパクトのあるメインビジュアルではなく、メインビジュアルがアニメーションを含んだメニューになっているのが非常に個性的ですが、使いやすい感じがします。ロゴに合わせてゴールドをベースにまとめられているのですが、いやらしさは全くなく、上品で現代的な印象になっています。全体的に少し堅い印象を差し込まれる、1筆書きで書いたようなイラストが中和してくれています。
            - heading "カッコいい建設会社のホームページデザイン" [level=2] [ref=e133]
            - heading "株式会社尾上建設" [level=3] [ref=e134]
            - paragraph [ref=e135]:
              - img "株式会社尾上建設" [ref=e136]
            - paragraph [ref=e137]:
              - link "https://www.ogami.co.jp/" [ref=e138] [cursor=pointer]:
                - /url: https://www.ogami.co.jp/
            - paragraph [ref=e139]: 濃いネイビーで全体がまとめられた、とにかくかっこいいホームページデザインの建設会社のホームページです。スクロールすると追従するタイプのメニューはよく見かけますが、このように立てて追従してくるパターンは珍しく印象的です。大きな写真を気持ちよく、しかも効果的に利用しているデザインは参考になります。これだけデザインにこだわると、制作物も建設物もこだわりを持ったクオリティの高いものに仕上げてくれそうなイメージになりますね。
            - heading "日建設計コンストラクション・マネジメント" [level=3] [ref=e140]
            - paragraph [ref=e141]:
              - img "日建設計コンストラクション・マネジメント" [ref=e142]
            - paragraph [ref=e143]:
              - link "https://www.nikken-cm.com/" [ref=e144] [cursor=pointer]:
                - /url: https://www.nikken-cm.com/
            - paragraph [ref=e145]: キャッチコピーと次々と切り替わる動画、そして最新のインフォメーションが全て表示されるメインビジュアルが印象的です。細目の文字をスペースを活かして効果的に配置しています。WEBフォントが効果的に利用されていますね。シンプルに掲載されがちな施工実績も写真がしっかり映えるような構成となっており、更新は少し大変かもしれませんが、お客様からの印象は非常に良いのではないでしょうか。
            - heading "大豊建設" [level=3] [ref=e146]
            - paragraph [ref=e147]:
              - img "大豊建設" [ref=e148]
            - paragraph [ref=e149]:
              - link "https://www.daiho.co.jp/" [ref=e150] [cursor=pointer]:
                - /url: https://www.daiho.co.jp/
            - paragraph [ref=e151]: 印象的なアニメーションと赤色でインパクトの強いアルファベットが印象的なホームページデザインです。ポイントで明朝の文字を利用し、メインビジュアルだけでなく、スクロールしていてもかっこいいです。ギャラリーは今となっては珍しいコンテンツですが、写真のクオリティが高いので、会社のブランディングに一役買っている形となっています。トップページだけでなく技術ソリューションページもかなりこだわっていて、とにかくアニメーションを効果的に利用し、顧客に世界観を伝えられているのではないでしょうか。
            - heading "世界観を感じる建設会社のホームページデザイン" [level=2] [ref=e152]
            - heading "山﨑建設工業株式会社" [level=3] [ref=e153]
            - paragraph [ref=e154]:
              - img "山﨑建設工業株式会社" [ref=e155]
            - paragraph [ref=e156]:
              - link "https://www.yamazaki-kk.jp/" [ref=e157] [cursor=pointer]:
                - /url: https://www.yamazaki-kk.jp/
            - paragraph [ref=e158]: あえてレトロにした写真加工を効果的に利用したホームページデザインです。ノスタルジックな雰囲気が独特の世界観を持っていてオシャレです。どういった狙いなのかはわかりませんが、フッターにメニューが一切なく、挑戦的な構成となっています。グーグルマップに過去の実績がまとめられている形式は、培った歴史をビジュアル的にわかりやすく表示する手法として大変有効ではないかと思いました。
            - heading "株式会社野村建設" [level=3] [ref=e159]
            - paragraph [ref=e160]:
              - img "株式会社野村建設" [ref=e161]
            - paragraph [ref=e162]:
              - link "https://www.clasico-nomura.jp/" [ref=e163] [cursor=pointer]:
                - /url: https://www.clasico-nomura.jp/
            - paragraph [ref=e164]: 建設会社でも、住宅を前面に打ち出した建設会社もあります。モダンな感じや和風な感じ、そしておしゃれな感じを同時に実現するような、シンプルながらもオシャレさが伝わってくるデザインです。写真のセンスがとにかく良いです。スクロールに合わせて写真が上下方向に少しずつずれる、気持ちのいいアニメーションは、ぜひどこかで取り入れたくなりますね。
            - heading "大手感のある建設会社のホームページデザイン" [level=2] [ref=e165]
            - heading "戸田建設株式会社" [level=3] [ref=e166]
            - paragraph [ref=e167]:
              - img "戸田建設株式会社" [ref=e168]
            - paragraph [ref=e169]:
              - link "https://www.toda.co.jp/" [ref=e170] [cursor=pointer]:
                - /url: https://www.toda.co.jp/
            - paragraph [ref=e171]: とにかく様々なステークホルダーに様々な導線を用意したトップページは、大手である印象を感じさせます。フッターあたりに掲載されているたくさんのバナーも、大手のホームページにありがちで、大手感の演出に一役かっているのではないでしょうか。デザイン的に特別お洒落というわけではありませんが、シンプルながらも見やすく、そして現代的にまとめる、ユーザービリティを意識したデザインとなっている点は参考になる企業も多いのではないでしょうか。
            - heading "大成建設株式会社" [level=3] [ref=e172]
            - paragraph [ref=e173]:
