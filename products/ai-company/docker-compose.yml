services:
  # --- Frontend (Next.js + API Routes) ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    environment:
      - NODE_ENV=development
      - WORKER_URL=http://worker:8000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/aicompany
    depends_on:
      db:
        condition: service_healthy

  # --- Worker (FastAPI + Claude Code + browser-use + gws) ---
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "6080:6080"
    volumes:
      - ./worker/app:/app/app
      - ./worker/project-context/company:/workspace/company
      - worker-data:/workspace/data
    environment:
      # Database
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/aicompany
      # Claude Code CLI (OAuth)
      - CLAUDE_CODE_USE_BEDROCK=${CLAUDE_CODE_USE_BEDROCK:-0}
      - IS_SANDBOX=${IS_SANDBOX:-1}
      # Google (gws + gemini)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Google OAuth2
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      # Webhook public URL (ngrok etc.)
      - PUBLIC_URL=${PUBLIC_URL:-}
      # LINE/Slack/Discord — コネクタ設定は Web UI から管理
      # Nango (サービス連携用)
      - NANGO_SECRET_KEY=${NANGO_SECRET_KEY:-}
      # Cloudflare R2
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-8a3d80a1153c0958366bccdbaa70e7b4}
      - R2_ENDPOINT=${R2_ENDPOINT:-https://8a3d80a1153c0958366bccdbaa70e7b4.r2.cloudflarestorage.com}
      - R2_BUCKET=${R2_BUCKET:-ai-company-dev}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  # --- Database (PostgreSQL) ---
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=aicompany
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./worker/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  worker-data:
